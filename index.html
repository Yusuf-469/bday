<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Happy Birthday Mom</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Three.js & GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F4E4C1;
            --sapphire: #0F172A;
            --candle-warm: #FFF8E7;
            --pearl: #E8D5E0;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --shadow-luxury: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--sapphire);
            color: var(--candle-warm);
            overflow-x: hidden;
            cursor: none;
            min-height: 100vh;
            min-height: 100dvh;
        }
        
        /* Mobile 16:9 container */
        @media (max-aspect-ratio: 9/16) {
            body {
                display: flex;
                justify-content: center;
                align-items: center;
            }
            
            #canvas-container,
            #prism-bg,
            .content {
                max-width: 100vh !important;
                max-height: 100vw !important;
            }
        }
        
        /* Custom Cursor */
        .cursor {
            width: 20px;
            height: 20px;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }
        
        .cursor::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold);
        }
        
        .cursor::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.5;
            animation: cursorPulse 2s ease-in-out infinite;
        }
        
        @keyframes cursorPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.2; }
        }
        
        /* Loading Screen */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-box {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.5);
            position: relative;
        }
        
        .loading-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .loading-text {
            margin-top: 30px;
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--gold);
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        .liquid-gold::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, var(--gold), var(--gold-light));
            animation: fillGold 3s ease-in-out forwards;
        }
        
        .liquid-gold::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 60%);
            animation: shimmer 2s ease-in-out infinite;
        }
        
        @keyframes fillGold {
            0% { height: 0%; }
            100% { height: 100%; }
        }
        
        @keyframes shimmer {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(10%, 10%); }
        }
        
        .loading-text {
            margin-top: 30px;
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--gold);
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* Prism Background */
        #prism-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            width: 100vw;
            height: 100vh;
        }
        
        /* Canvas Container - behind content, in front of prism */
        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            transition: opacity 0.8s ease;
        }
        
        #canvas-container.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        /* Main Content */
        .content {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }
        
        .content > * {
            pointer-events: auto;
        }
        
        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* AirDrop Card */
        .airdrop-card {
            width: min(90vw, 400px);
            padding: 40px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--shadow-luxury);
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: transform 0.1s ease;
        }
        
        .airdrop-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.4);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .airdrop-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--sapphire);
        }
        
        .airdrop-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .airdrop-header h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-weight: 500;
            color: var(--gold-light);
            letter-spacing: 0.5px;
        }
        
        .airdrop-header .sender-name {
            font-weight: 700;
            color: var(--gold);
        }
        
        /* Message Display */
        .message-container {
            min-height: 80px;
            margin-bottom: 30px;
        }
        
        .message {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: 500;
            text-align: center;
            line-height: 1.6;
            color: var(--candle-warm);
            opacity: 0;
            transform: translateY(20px);
        }
        
        .message.active {
            opacity: 1;
            transform: translateY(0);
            transition: all 0.8s ease;
        }
        
        .message .shimmer {
            background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-light));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerText 3s linear infinite;
        }
        
        @keyframes shimmerText {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        
        /* Wish Button */
        .wish-button {
            display: block;
            width: 100%;
            padding: 18px 30px;
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 50px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gold);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .wish-button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }
        
        .wish-button:hover {
            color: var(--sapphire);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5), inset 0 0 20px rgba(255,255,255,0.2);
            transform: scale(1.02);
        }
        
        .wish-button:active {
            transform: scale(0.98);
        }
        
        /* Sparkle Container */
        .sparkles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--gold);
            border-radius: 50%;
            animation: sparkleAnim 1s ease-out forwards;
        }
        
        @keyframes sparkleAnim {
            0% { transform: scale(0) translate(0, 0); opacity: 1; }
            100% { transform: scale(1) translate(var(--tx), var(--ty)); opacity: 0; }
        }
        
        /* Scroll Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }
        
        .scroll-indicator span {
            font-size: 0.8rem;
            color: var(--gold-light);
            opacity: 0.7;
        }
        
        .scroll-indicator svg {
            width: 24px;
            height: 24px;
            fill: var(--gold);
        }
        
        /* Memory Lane Section */
        .memory-lane {
            min-height: 100vh;
            padding: 100px 0;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .section-title {
            display: none;
        }
        
        .timeline-container {
            display: flex;
            gap: 40px;
            padding: 0 50px;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            cursor: grab;
            width: 100%;
            justify-content: center;
        }
        
        .timeline-container::-webkit-scrollbar {
            display: none;
        }
        
        .timeline-container:active {
            cursor: grabbing;
        }
        
        .memory-card {
            flex-shrink: 0;
            width: min(280px, 70vw);
            aspect-ratio: 3/4;
            border-radius: 20px;
            padding: 10px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            background: linear-gradient(145deg, rgba(26,26,26,0.8), rgba(42,42,42,0.8));
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        
        .memory-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border: 2px solid var(--gold);
            border-radius: 22px;
            opacity: 0.5;
        }
        
        .memory-card:hover {
            transform: translateY(-10px) rotateX(5deg);
        }
        
        .memory-image {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--gold) 0%, var(--sapphire) 100%);
        }
        
        /* Crystal Ball Section */
        .crystal-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
        }
        
        .crystal-container {
            width: min(350px, 80vw);
            height: min(350px, 80vw);
            position: relative;
            cursor: grab;
        }
        
        .crystal-container:active {
            cursor: grabbing;
        }
        
        .crystal-ball {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255,255,255,0.4) 0%, 
                rgba(212,175,55,0.2) 30%,
                rgba(15,23,42,0.8) 70%,
                rgba(15,23,42,1) 100%);
            box-shadow: 
                0 0 60px rgba(212,175,55,0.3),
                inset 0 0 60px rgba(255,255,255,0.1),
                0 0 100px rgba(15,23,42,0.5);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }
        
        .crystal-ball.magical {
            box-shadow: 
                0 0 80px rgba(212,175,55,0.6),
                0 0 120px rgba(212,175,55,0.4),
                inset 0 0 80px rgba(255,255,255,0.2),
                0 0 150px rgba(15,23,42,0.6);
        }
        
        .crystal-photo {
            position: absolute;
            inset: 10%;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s ease;
        }
        
        .crystal-stand {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 40px;
            background: linear-gradient(to bottom, var(--gold), #8B7355);
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .drag-hint {
            margin-top: 50px;
            font-size: 0.9rem;
            color: var(--gold-light);
            opacity: 0.7;
        }
        
        /* AR Section */
        .ar-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            text-align: center;
        }
        
        .ar-content {
            max-width: 500px;
        }
        
        .ar-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: var(--gold);
            margin-bottom: 20px;
        }
        
        .ar-description {
            color: var(--gold-light);
            margin-bottom: 40px;
            line-height: 1.8;
            opacity: 0.8;
        }
        
        .qr-container {
            position: relative;
            display: inline-block;
            padding: 30px;
            background: white;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .qr-code {
            width: 200px;
            height: 200px;
        }
        
        .qr-aura {
            position: absolute;
            inset: -20px;
            border: 2px solid var(--gold);
            border-radius: 30px;
            animation: qrPulse 2s ease-in-out infinite;
            opacity: 0.5;
        }
        
        @keyframes qrPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.2; }
        }
        
        .ar-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 35px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            border: none;
            border-radius: 50px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--sapphire);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .ar-button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(212,175,55,0.4);
        }
        
        .ar-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Audio Toggle */
        .audio-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .audio-toggle:hover {
            background: rgba(212,175,55,0.2);
        }
        
        .audio-toggle svg {
            width: 24px;
            height: 24px;
            fill: var(--gold);
        }
        
        /* Mic Button */
        .mic-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(212,175,55,0.4);
            transition: all 0.3s ease;
        }
        
        .mic-button:hover {
            transform: scale(1.1);
        }
        
        .mic-button.active {
            animation: micPulse 1s ease-in-out infinite;
        }
        
        @keyframes micPulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(212,175,55,0.4); }
            50% { box-shadow: 0 10px 50px rgba(212,175,55,0.8); }
        }
        
        .mic-button svg {
            width: 28px;
            height: 28px;
            fill: var(--sapphire);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .airdrop-card {
                padding: 30px 20px;
                margin: 0 20px;
            }
            
            .timeline-container {
                padding: 0 20px;
            }
            
            .memory-card {
                width: 240px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading">
        <div class="loading-box">
            <img src="./assets/4.jpeg" alt="Loading">
        </div>
        <div class="loading-text">Happy Birthday, Mom</div>
    </div>
    
    <!-- Custom Cursor -->
    <div class="cursor" id="cursor"></div>
    
    <!-- Prism Background -->
    <div id="prism-bg"></div>
    
    <!-- 3D Canvas -->
    <div id="canvas-container"></div>
    
    <!-- Main Content -->
    <div class="content">
        <!-- Hero Section -->
        <section class="hero" id="hero">
            <div class="airdrop-card" id="airdrop-card">
                <div class="airdrop-icon">
                    <img src="./assets/5.jpeg" alt="Yusuf" style="width:100%;height:100%;border-radius:20px;object-fit:cover;">
                </div>
                <div class="airdrop-header">
                    <h2>AirDrop from <span class="sender-name" id="sender-name">Aapka Beta Yusuf</span></h2>
                </div>
                <div class="message-container">
                    <p class="message" id="message"></p>
                </div>
                <button class="wish-button" id="wish-button">Make a Wish</button>
                <div class="sparkles" id="sparkles"></div>
            </div>
            
            <div class="scroll-indicator">
                <span>Scroll to explore</span>
                <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
            </div>
        </section>
        
        <!-- Memory Lane Section -->
        <section class="memory-lane" id="memory-lane">
            <h2 class="section-title">Memory Lane</h2>
            <div class="timeline-container" id="timeline">
                <!-- Memory cards will be inserted here -->
            </div>
        </section>
        
        <!-- Crystal Ball Section -->
        <section class="crystal-section" id="crystal">
            <h2 class="section-title">Treasured Moments</h2>
            <div class="crystal-container" id="crystal-container">
                <div class="crystal-ball">
                    <div class="crystal-photo" id="crystal-photo"></div>
                </div>
                <div class="crystal-stand"></div>
            </div>
            <p class="drag-hint" id="drag-hint">Drag to reveal memories</p>
        </section>
        
        <!-- AR Section -->
        <section class="ar-section" id="ar">
            <div class="ar-content">
                <h2 class="ar-title">Meri Pyari Maa Ka Cake</h2>
                <p class="ar-description">Scan the QR code with your phone to place the magical birthday cake in your physical environment.</p>
                <div class="qr-container">
                    <canvas id="qr-canvas" class="qr-code"></canvas>
                    <div class="qr-aura"></div>
                </div>
                <br><br>
                <button class="ar-button" id="ar-button">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm8-2h8v8h-8v-8zm2 2v4h4v-4h-4z"/>
                    </svg>
                    Experience in AR
                </button>
            </div>
        </section>
    </div>
    
    <!-- Audio Toggle -->
    <button class="audio-toggle" id="audio-toggle" title="Toggle Audio">
        <svg viewBox="0 0 24 24" id="audio-icon">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
    </button>
    
    <!-- Mic Button -->
    <button class="mic-button" id="mic-button" title="Blow out candles">
        <svg viewBox="0 0 24 24">

    <script>
