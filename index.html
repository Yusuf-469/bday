        // ========================================
        // PRISM BACKGROUND (Three.js)
        // ========================================
        class PrismBackground {
            constructor(container) {
                this.container = container;
                this.init();
            }
            
            init() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                
                this.renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
                
                Object.assign(this.renderer.domElement.style, {
                    position: 'absolute',
                    inset: '0',
                    width: '100%',
                    height: '100%',
                    display: 'block'
                });
                
                this.container.appendChild(this.renderer.domElement);
                
                const geometry = new THREE.PlaneGeometry(2, 2);
                
                const H = 15.0;
                const BW = 20.0;
                const BASE_HALF = BW * 0.5;
                
                this.material = new THREE.ShaderMaterial({
                    vertexShader: `
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        precision highp float;
                        uniform vec2 iResolution;
                        uniform float iTime;
                        uniform float uHeight;
                        uniform float uBaseHalf;
                        uniform mat3 uRot;
                        uniform float uGlow;
                        uniform vec2 uOffsetPx;
                        uniform float uNoise;
                        uniform float uSaturation;
                        uniform float uScale;
                        uniform float uColorFreq;
                        uniform float uBloom;
                        uniform float uCenterShift;
                        uniform float uInvBaseHalf;
                        uniform float uInvHeight;
                        uniform float uMinAxis;
                        uniform float uPxScale;
                        uniform float uTimeScale;

                        vec4 tanh4(vec4 x){
                            vec4 e2x = exp(2.0*x);
                            return (e2x - 1.0) / (e2x + 1.0);
                        }

                        float rand(vec2 co){
                            return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453123);
                        }

                        float sdOctaAnisoInv(vec3 p){
                            vec3 q = vec3(abs(p.x) * uInvBaseHalf, abs(p.y) * uInvHeight, abs(p.z) * uInvBaseHalf);
                            float m = q.x + q.y + q.z - 1.0;
                            return m * uMinAxis * 0.5773502691896258;
                        }

                        float sdPyramidUpInv(vec3 p){
                            float oct = sdOctaAnisoInv(p);
                            float halfSpace = -p.y;
                            return max(oct, halfSpace);
                        }

                        void main(){
                            vec2 f = (gl_FragCoord.xy - 0.5 * iResolution.xy - uOffsetPx) * uPxScale;
                            float z = 5.0;
                            float d = 0.0;
                            vec3 p;
                            vec4 o = vec4(0.0);
                            float centerShift = uCenterShift;
                            float cf = uColorFreq;
                            
                            float t = iTime * uTimeScale;
                            float c0 = cos(t + 0.0);
                            float c1 = cos(t + 33.0);
                            float c2 = cos(t + 11.0);
                            mat2 wob = mat2(c0, c1, c2, c0);

                            const int STEPS = 60;
                            for (int i = 0; i < STEPS; i++) {
                                p = vec3(f, z);
                                p.xz = p.xz * wob;
                                p = uRot * p;
                                vec3 q = p;
                                q.y += centerShift;
                                d = 0.1 + 0.2 * abs(sdPyramidUpInv(q));
                                z -= d;
                                o += (sin((p.y + z) * cf + vec4(0.0, 1.0, 2.0, 3.0)) + 1.0) / d;
                            }

                            o = tanh4(o * o * (uGlow * uBloom) / 1e5);
                            vec3 col = o.rgb;
                            float n = rand(gl_FragCoord.xy + vec2(iTime));
                            col += (n - 0.5) * uNoise;
                            col = clamp(col, 0.0, 1.0);
                            
                            float L = dot(col, vec3(0.2126, 0.7152, 0.0722));
                            col = clamp(mix(vec3(L), col, uSaturation), 0.0, 1.0);
                            
                            gl_FragColor = vec4(col, o.a);
                        }
                    `,
                    uniforms: {
                        iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                        iTime: { value: 0 },
                        uHeight: { value: H },
                        uBaseHalf: { value: BASE_HALF },
                        uRot: { value: new THREE.Matrix3().set(
                            1, 0, 0,
                            0, 1, 0,
                            0, 0, 1
                       ) },
                        uGlow: { value: 2.0 },
                        uOffsetPx: { value: new THREE.Vector2(0, 0) },
                        uNoise: { value: 0.0 },
                        uSaturation: { value: 2.0 },
                        uScale: { value: 500.0 },
                        uColorFreq: { value: 1.0 },
                        uBloom: { value: 2.0 },
                        uCenterShift: { value: H * 0.25 },
                        uInvBaseHalf: { value: 1 / BASE_HALF },
                        uInvHeight: { value: 1 / H },
                        uMinAxis: { value: Math.min(BASE_HALF, H) },
                        uPxScale: { value: 0.02 },
                        uTimeScale: { value: 0.5 }
                    },
                    transparent: true,
                    depthWrite: false,
                    depthTest: false
                });
                
                const mesh = new THREE.Mesh(geometry, this.material);
                this.scene.add(mesh);
                
                window.addEventListener('resize', () => this.resize());
                this.animate();
            }
            
            resize() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.material.uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
            }
            
            animate() {
                const t0 = performance.now();
                
                const render = (t) => {
                    const time = (t - t0) * 0.001;
                    this.material.uniforms.iTime.value = time;
                    
                    this.renderer.render(this.scene, this.camera);
                    requestAnimationFrame(render);
                };
                
                requestAnimationFrame(render);
            }
        }

        // ========================================
        // THREE.JS CAKE SCENE
        // ========================================
        class BirthdayApp {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.clock = new THREE.Clock();
                this.mouse = new THREE.Vector2(0, 0);
                this.targetMouse = new THREE.Vector2(0, 0);
                this.candleLights = [];
                this.flames = [];
                this.particles = [];
                this.rosePetals = [];
                this.candlesBlown = false;
                this.audioContext = null;
                this.micActive = false;
                this.analyser = null;
                this.dataArray = null;
                this.audioEnabled = false;
                
                this.init();
            }
            
            init() {
                // Start prism background immediately
                
                this.setupThree();
                this.createBackground();
                this.createCake();
                this.createParticles();
                this.createLighting();
                this.setupEventListeners();
                this.setupUI();
                this.generateQRCode();
                this.startCrystalBall();
                this.animate();
                
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    this.startMessageRotation();
                }, 3500);
            }
            
            setupThree() {
                this.scene = new THREE.Scene();
                
                const aspect = window.innerWidth / window.innerHeight;
                const fov = window.innerWidth < 768 ? 60 : 45;
                this.camera = new THREE.PerspectiveCamera(fov, aspect, 0.1, 1000);
                this.camera.position.set(0, 2, 8);
                this.camera.lookAt(0, 1, 0);
                
                this.renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    alpha: true,
                    powerPreference: 'high-performance'
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                
                document.getElementById('canvas-container').appendChild(this.renderer.domElement);
            }
            
            createBackground() {
                this.scene.background = null;
            }
            
            createCake() {
                this.cakeGroup = new THREE.Group();
                
                const tierGeometry = (radius, height) => {
                    return new THREE.CylinderGeometry(radius, radius * 1.05, height, 64);
                };
                
                const cakeMaterial = new THREE.MeshStandardMaterial({
                    color: 0xFFF8F0,
                    roughness: 0.3,
                    metalness: 0.0,
                });
                
                const tier1 = new THREE.Mesh(tierGeometry(2.0, 0.8), cakeMaterial);
                tier1.position.y = 0.4;
                tier1.castShadow = true;
                tier1.receiveShadow = true;
                this.cakeGroup.add(tier1);
                
                const tier2 = new THREE.Mesh(tierGeometry(1.5, 0.7), cakeMaterial);
                tier2.position.y = 1.15;
                tier2.castShadow = true;
                this.cakeGroup.add(tier2);
                
                const tier3 = new THREE.Mesh(tierGeometry(1.0, 0.6), cakeMaterial);
                tier3.position.y = 1.8;
                tier3.castShadow = true;
                this.cakeGroup.add(tier3);
                
                const goldMaterial = new THREE.MeshStandardMaterial({
                    color: 0xD4AF37,
                    roughness: 0.1,
                    metalness: 1.0,
                    emissive: 0xD4AF37,
                    emissiveIntensity: 0.1
                });
                
                const ring1 = new THREE.Mesh(new THREE.TorusGeometry(1.52, 0.03, 16, 64), goldMaterial);
                ring1.position.y = 0.8;
                ring1.rotation.x = Math.PI / 2;
                this.cakeGroup.add(ring1);
                
                const ring2 = new THREE.Mesh(new THREE.TorusGeometry(1.02, 0.03, 16, 64), goldMaterial);
                ring2.position.y = 1.55;
                ring2.rotation.x = Math.PI / 2;
                this.cakeGroup.add(ring2);
                
                const flowerColors = [0xFFB6C1, 0xFF69B4, 0xFFD700, 0xE6E6FA];
                const flowerMaterial = (color) => new THREE.MeshStandardMaterial({
                    color: color,
                    roughness: 0.4,
                    metalness: 0.1,
                    transparent: true,
                    opacity: 0.9
                });
                
                const flowerPositions = [
                    { x: 1.8, y: 0.6, z: 0.5 },
                    { x: -1.5, y: 0.7, z: 0.8 },
                    { x: 0.3, y: 1.4, z: 1.3 },
                    { x: -0.8, y: 1.5, z: -1.0 },
                    { x: 1.2, y: 2.0, z: -0.5 }
                ];
                
                flowerPositions.forEach((pos, i) => {
                    const flower = new THREE.Mesh(
                        new THREE.SphereGeometry(0.15, 16, 16),
                        flowerMaterial(flowerColors[i % flowerColors.length])
                    );
                    flower.position.set(pos.x, pos.y, pos.z);
                    flower.scale.set(1, 0.6, 1);
                    this.cakeGroup.add(flower);
                });
                
                this.createCandles();
                
                const plateGeometry = new THREE.CylinderGeometry(2.5, 2.3, 0.1, 64);
                const plateMaterial = new THREE.MeshStandardMaterial({
                    color: 0xFFFFFF,
                    roughness: 0.1,
                    metalness: 0.3
                });
                const plate = new THREE.Mesh(plateGeometry, plateMaterial);
                plate.position.y = -0.05;
                plate.receiveShadow = true;
                this.cakeGroup.add(plate);
                
                this.scene.add(this.cakeGroup);
            }
            
            createCandles() {
                const candleGeometry = new THREE.CylinderGeometry(0.05, 0.06, 0.4, 16);
                const candleMaterial = new THREE.MeshStandardMaterial({
                    color: 0xFFF8E7,
                    roughness: 0.6,
                    metalness: 0.0
                });
                
                const candlePositions = [
                    { x: 0, z: 0 },
                    { x: 0.5, z: 0.5 },
                    { x: -0.5, z: 0.5 }
                ];
                
                candlePositions.forEach((pos, index) => {
                    const candleGroup = new THREE.Group();
                    
                    const candle = new THREE.Mesh(candleGeometry, candleMaterial);
                    candle.position.y = 0.2;
                    candleGroup.add(candle);
                    
                    const wickGeometry = new THREE.CylinderGeometry(0.005, 0.005, 0.08, 8);
                    const wickMaterial = new THREE.MeshBasicMaterial({ color: 0x333333 });
                    const wick = new THREE.Mesh(wickGeometry, wickMaterial);
                    wick.position.y = 0.44;
                    candleGroup.add(wick);
                    
                    const flameGeometry = new THREE.ConeGeometry(0.06, 0.2, 16);
                    const flameMaterial = new THREE.ShaderMaterial({
                        uniforms: { uTime: { value: 0 } },
                        vertexShader: `
                            uniform float uTime;
                            varying vec2 vUv;
                            void main() {
                                vUv = uv;
                                vec3 pos = position;
                                float flicker = sin(uTime * 10.0) * 0.02;
                                float noiseDisp = fract(sin(dot(uv, vec2(127.1, 311.7))) * 43758.5453) * 0.05;
                                pos.x += flicker + noiseDisp * (1.0 - uv.y);
                                pos.z += noiseDisp * 0.5 * (1.0 - uv.y);
                                float taper = 1.0 - pow(uv.y, 0.5);
                                pos.x *= taper;
                                pos.z *= taper;
                                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                            }
                        `,
                        fragmentShader: `
                            uniform float uTime;
                            varying vec2 vUv;
                            void main() {
                                vec3 coreColor = vec3(1.0, 1.0, 0.9);
                                vec3 midColor = vec3(1.0, 0.7, 0.2);
                                vec3 tipColor = vec3(1.0, 0.3, 0.0);
                                float gradient = vUv.y;
                                vec3 color = mix(coreColor, midColor, smoothstep(0.0, 0.4, gradient));
                                color = mix(color, tipColor, smoothstep(0.4, 1.0, gradient));
                                float flicker = sin(uTime * 15.0) * 0.1 + 0.9;
                                color *= flicker;
                                float glow = 1.0 - gradient;
                                color += vec3(1.0, 0.5, 0.1) * glow * 0.5;
                                float alpha = 1.0 - smoothstep(0.8, 1.0, gradient);
                                alpha *= flicker;
                                gl_FragColor = vec4(color, alpha);
                            }
                        `,
                        transparent: true,
                        side: THREE.DoubleSide,
                        depthWrite: false,
                        blending: THREE.AdditiveBlending
                    });
                    
                    const flame = new THREE.Mesh(flameGeometry, flameMaterial);
                    flame.position.y = 0.55;
                    candleGroup.add(flame);
                    this.flames.push(flameMaterial);
                    
                    const candleLight = new THREE.PointLight(0xFF9500, 1.5, 5);
                    candleLight.position.y = 0.5;
                    candleGroup.add(candleLight);
                    this.candleLights.push(candleLight);
                    
                    candleGroup.position.set(pos.x, 2.1, pos.z);
                    this.cakeGroup.add(candleGroup);
                });
            }
            
            createParticles() {
                const dustGeometry = new THREE.BufferGeometry();
                const dustCount = 150;
                const dustPositions = new Float32Array(dustCount * 3);
                
                for (let i = 0; i < dustCount; i++) {
                    dustPositions[i * 3] = (Math.random() - 0.5) * 20;
                    dustPositions[i * 3 + 1] = Math.random() * 10;
                    dustPositions[i * 3 + 2] = (Math.random() - 0.5) * 10;
                }
                
                dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
                
                const dustMaterial = new THREE.PointsMaterial({
                    color: 0xD4AF37,
                    size: 0.05,
                    transparent: true,
                    opacity: 0.6,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                
                this.dustParticles = new THREE.Points(dustGeometry, dustMaterial);
                this.scene.add(this.dustParticles);
                
                const petalGeometry = new THREE.PlaneGeometry(0.15, 0.15);
                const petalMaterial = new THREE.MeshBasicMaterial({
                    color: 0xFFB6C1,
                    transparent: true,
                    opacity: 0.7,
                    side: THREE.DoubleSide
                });
                
                for (let i = 0; i < 30; i++) {
                    const petal = new THREE.Mesh(petalGeometry, petalMaterial.clone());
                    petal.position.set(
                        (Math.random() - 0.5) * 15,
                        Math.random() * 8,
                        (Math.random() - 0.5) * 10
                    );
                    petal.rotation.set(
                        Math.random() * Math.PI,
                        Math.random() * Math.PI,
                        Math.random() * Math.PI
                    );
                    petal.userData = {
                        velocity: new THREE.Vector3(
                            (Math.random() - 0.5) * 0.01,
                            -0.005 - Math.random() * 0.01,
                            (Math.random() - 0.5) * 0.01
                        ),
                        rotationSpeed: new THREE.Vector3(
                            Math.random() * 0.02,
                            Math.random() * 0.02,
                            Math.random() * 0.02
                        )
                    };
                    this.rosePetals.push(petal);
                    this.scene.add(petal);
                }
            }
            
            createLighting() {
                const ambient = new THREE.AmbientLight(0xFFF8E7, 0.4);
                this.scene.add(ambient);
                
                const spotlight = new THREE.SpotLight(0xFFF8E7, 2);
                spotlight.position.set(0, 10, 5);
                spotlight.angle = Math.PI / 6;
                spotlight.penumbra = 0.5;
                spotlight.castShadow = true;
                spotlight.shadow.mapSize.width = 1024;
                spotlight.shadow.mapSize.height = 1024;
                this.scene.add(spotlight);
                
                const rimLight1 = new THREE.PointLight(0xD4AF37, 0.5, 15);
                rimLight1.position.set(-5, 3, 0);
                this.scene.add(rimLight1);
                
                const rimLight2 = new THREE.PointLight(0xD4AF37, 0.5, 15);
                rimLight2.position.set(5, 3, 0);
                this.scene.add(rimLight2);
            }
            
            setupEventListeners() {
                window.addEventListener('mousemove', (e) => {
                    this.targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                    this.targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                    
                    const cursor = document.getElementById('cursor');
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                });
                
                window.addEventListener('touchmove', (e) => {
                    if (e.touches.length > 0) {
                        this.targetMouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                        this.targetMouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
                    }
                });
                
                window.addEventListener('resize', () => {
                    const width = window.innerWidth;
                    const height = window.innerHeight;
                    this.camera.aspect = width / height;
                    this.camera.fov = width < 768 ? 60 : 45;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(width, height);
                });
                
                window.addEventListener('scroll', () => {
                    const scrollY = window.scrollY;
                    const heroSection = document.getElementById('hero');
                    const heroHeight = heroSection.offsetHeight;
                    const canvasContainer = document.getElementById('canvas-container');
                    
                    // Hide cake when scrolling past hero section
                    if (scrollY > heroHeight * 0.3) {
                        canvasContainer.classList.add('hidden');
                    } else {
                        canvasContainer.classList.remove('hidden');
                    }
                    
                    if (scrollY < heroHeight) {
                        const parallax = scrollY * 0.02;
                        this.camera.position.y = 2 - parallax;
                    }
                });
                
                // Wish button - glows candles and removes dashboard
                document.getElementById('wish-button').addEventListener('click', () => {
                    const button = document.getElementById('wish-button');
                    const card = document.getElementById('airdrop-card');
                    const scrollIndicator = document.querySelector('.scroll-indicator');
                    
                    // Hide button, card and scroll indicator
                    button.style.display = 'none';
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.8)';
                    setTimeout(() => {
                        card.style.display = 'none';
                        scrollIndicator.style.display = 'none';
                    }, 500);
                    
                    // Make candles glow brighter
                    this.candleLights.forEach(light => {
                        gsap.to(light, {
                            duration: 1,
                            intensity: 3,
                            ease: 'power2.out'
                        });
                    });
                    
                    this.createSparkles();
                    this.playSound('wish');
                });
                
                // AirDrop card tilt
                const airdropCard = document.getElementById('airdrop-card');
                airdropCard.addEventListener('mousemove', (e) => {
                    const rect = airdropCard.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    airdropCard.style.transform = `rotateY(${x * 10}deg) rotateX(${-y * 15}deg)`;
                });
                
                airdropCard.addEventListener('mouseleave', () => {
                    airdropCard.style.transform = 'rotateY(0deg) rotateX(0deg)';
                });
                
                // Audio toggle
                document.getElementById('audio-toggle').addEventListener('click', () => {
                    this.toggleAudio();
                });
                
                // Mic button
                document.getElementById('mic-button').addEventListener('click', () => {
                    this.toggleMicrophone();
                });
                
                // AR button
                document.getElementById('ar-button').addEventListener('click', () => {
                    this.startAR();
                });
            }
            
            setupUI() {
                document.getElementById('sender-name').textContent = CONFIG.senderName;
                
                // Create memory cards
                const timeline = document.getElementById('timeline');
                CONFIG.memoryPhotos.forEach((photo) => {
                    const card = document.createElement('div');
                    card.className = 'memory-card';
                    card.innerHTML = `<img class="memory-image" src="${photo}" alt="Memory">`;
                    timeline.appendChild(card);
                });
            }
            
            startMessageRotation() {
                let messageIndex = 0;
                const messageEl = document.getElementById('message');
                
                const showMessage = () => {
                    messageEl.classList.remove('active');
                    
                    setTimeout(() => {
                        messageEl.innerHTML = `<span class="shimmer">${CONFIG.messages[messageIndex]}</span>`;
                        messageEl.classList.add('active');
                        
                        messageIndex = (messageIndex + 1) % CONFIG.messages.length;
                    }, 500);
                };
                
                showMessage();
                setInterval(showMessage, 5000);
            }
            
            createSparkles() {
                const sparklesContainer = document.getElementById('sparkles');
                const button = document.getElementById('wish-button');
                const rect = button.getBoundingClientRect();
                
                for (let i = 0; i < 30; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.style.left = rect.left + rect.width / 2 + 'px';
                    sparkle.style.top = rect.top + rect.height / 2 + 'px';
                    sparkle.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
                    sparkle.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
                    sparkle.style.background = Math.random() > 0.5 ? '#D4AF37' : '#FFF8E7';
                    
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 1000);
                }
            }
            
            generateQRCode() {
                const canvas = document.getElementById('qr-canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 200;
                canvas.height = 200;
                
                const size = 200;
                const moduleSize = 8;
                const modules = 21;
                
                const drawFinder = (x, y) => {
                    ctx.fillStyle = '#0F172A';
                    ctx.fillRect(x, y, 7 * moduleSize, 7 * moduleSize);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(x + moduleSize, y + moduleSize, 5 * moduleSize, 5 * moduleSize);
                    ctx.fillStyle = '#0F172A';
                    ctx.fillRect(x + 2 * moduleSize, y + 2 * moduleSize, 3 * moduleSize, 3 * moduleSize);
                };
                
                drawFinder(0, 0);
                drawFinder(size - 7 * moduleSize, 0);
                drawFinder(0, size - 7 * moduleSize);
                
                ctx.fillStyle = '#0F172A';
                for (let i = 0; i < modules; i++) {
                    for (let j = 0; j < modules; j++) {
                        if ((i < 8 && j < 8) || (i < 8 && j >= modules - 8) || (i >= modules - 8 && j < 8)) continue;
                        if (Math.random() > 0.5) {
                            ctx.fillRect(i * moduleSize, j * moduleSize, moduleSize - 1, moduleSize - 1);
                        }
                    }
                }
                
                ctx.fillStyle = '#0F172A';
                ctx.font = 'bold 14px Plus Jakarta Sans';
                ctx.textAlign = 'center';
                ctx.fillText('Scan for AR', size / 2, size + 20);
            }
            
            startCrystalBall() {
                const crystalContainer = document.getElementById('crystal-container');
                const crystalBall = document.querySelector('.crystal-ball');
                const crystalPhoto = document.getElementById('crystal-photo');
                const dragHint = document.getElementById('drag-hint');
                let crystalStartX = 0;
                let currentRotation = 0;
                let autoRotate = null;
                let isDragging = false;
                let touchStartX = 0;
                
                // Set initial photo
                crystalPhoto.style.backgroundImage = `url(${CONFIG.memoryPhotos[0]})`;
                
                // Create magical particles
                const createMagicalParticles = (x, y) => {
                    for (let i = 0; i < 10; i++) {
                        const particle = document.createElement('div');
                        particle.style.cssText = `
                            position: absolute;
                            width: ${Math.random() * 8 + 4}px;
                            height: ${Math.random() * 8 + 4}px;
                            background: ${Math.random() > 0.5 ? '#D4AF37' : '#FFF8E7'};
                            border-radius: 50%;
                            left: ${x}px;
                            top: ${y}px;
                            pointer-events: none;
                            z-index: 100;
                            box-shadow: 0 0 10px #D4AF37;
                        `;
                        crystalContainer.appendChild(particle);
                        
                        const angle = Math.random() * Math.PI * 2;
                        const distance = Math.random() * 100 + 50;
                        const tx = Math.cos(angle) * distance;
                        const ty = Math.sin(angle) * distance;
                        
                        particle.animate([
                            { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                            { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                        ], {
                            duration: 1000,
                            easing: 'ease-out'
                        }).onfinish = () => particle.remove();
                    }
                };
                
                // Magical effect on click/touch
                const triggerMagicalEffect = (e) => {
                    const rect = crystalContainer.getBoundingClientRect();
                    let x, y;
                    
                    if (e.touches) {
                        x = e.touches[0].clientX - rect.left;
                        y = e.touches[0].clientY - rect.top;
                    } else {
                        x = e.clientX - rect.left;
                        y = e.clientY - rect.top;
                    }
                    
                    // Add magical glow
                    crystalBall.classList.add('magical');
                    setTimeout(() => crystalBall.classList.remove('magical'), 500);
                    
                    // Create particles
                    createMagicalParticles(x, y);
                    
                    // Hide hint on first interaction
                    if (dragHint) {
                        dragHint.style.opacity = '0';
                        dragHint.style.transition = 'opacity 0.5s ease';
                    }
                };
                
                // Auto-rotate through photos
                let photoIndex = 0;
                autoRotate = setInterval(() => {
                    photoIndex = (photoIndex + 1) % CONFIG.memoryPhotos.length;
                    crystalPhoto.style.backgroundImage = `url(${CONFIG.memoryPhotos[photoIndex]})`;
                }, 3000);
                
                // Mouse events
                crystalContainer.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    crystalStartX = e.clientX;
                    crystalContainer.style.cursor = 'grabbing';
                    triggerMagicalEffect(e);
                    if (autoRotate) {
                        clearInterval(autoRotate);
                        autoRotate = null;
                    }
                });
                
                window.addEventListener('mouseup', () => {
                    isDragging = false;
                    crystalContainer.style.cursor = 'grab';
                    if (!autoRotate) {
                        autoRotate = setInterval(() => {
                            photoIndex = (photoIndex + 1) % CONFIG.memoryPhotos.length;
                            crystalPhoto.style.backgroundImage = `url(${CONFIG.memoryPhotos[photoIndex]})`;
                        }, 3000);
                    }
                });
                
                window.addEventListener('mousemove', (e) => {
                    if (crystalStartX === 0) return;
                    const delta = e.clientX - crystalStartX;
                    currentRotation += delta * 0.5;
                    crystalStartX = e.clientX;
                    
                    crystalPhoto.style.transform = `rotateY(${currentRotation}°)`;
                });
                
                // Touch events for mobile
                crystalContainer.addEventListener('touchstart', (e) => {
                    isDragging = true;
                    touchStartX = e.touches[0].clientX;
                    crystalContainer.style.cursor = 'grabbing';
                    triggerMagicalEffect(e);
                    if (autoRotate) {
                        clearInterval(autoRotate);
                        autoRotate = null;
                    }
                    e.preventDefault();
                });
                
                crystalContainer.addEventListener('touchend', () => {
                    isDragging = false;
                    crystalContainer.style.cursor = 'grab';
                    if (!autoRotate) {
                        autoRotate = setInterval(() => {
                            if (!isDragging) {
                                photoIndex = (photoIndex + 1) % CONFIG.memoryPhotos.length;
                                crystalPhoto.style.backgroundImage = `url(${CONFIG.memoryPhotos[photoIndex]})`;
                            }
                        }, 3000);
                    }
                });
                
                crystalContainer.addEventListener('touchmove', (e) => {
                    if (touchStartX === 0) return;
                    const delta = e.touches[0].clientX - touchStartX;
                    currentRotation += delta * 0.5;
                    touchStartX = e.touches[0].clientX;
                    
                    crystalPhoto.style.transform = `rotateY(${currentRotation}°)`;
                });
                
                // Click to trigger magic
                crystalContainer.addEventListener('click', (e) => {
                    triggerMagicalEffect(e);
                });
            }
            
            toggleAudio() {
                this.audioEnabled = !this.audioEnabled;
                const icon = document.getElementById('audio-icon');
                
                if (this.audioEnabled) {
                    icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
                    
                    if (!this.audioContext) {
                        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }
                } else {
                    icon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
                    if (this.audioContext) {
                        this.audioContext.suspend();
                    }
                }
            }
            
            playSound(type) {
                if (!this.audioEnabled || !this.audioContext) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                if (type === 'wish') {
                    oscillator.frequency.setValueAtTime(523.25, this.audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1046.5, this.audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.5);
                    oscillator.start();
                    oscillator.stop(this.audioContext.currentTime + 0.5);
                } else if (type === 'blow') {
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(200, this.audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(50, this.audioContext.currentTime + 1);
                    gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 1);
                    oscillator.start();
                    oscillator.stop(this.audioContext.currentTime + 1);
                }
            }
            
            async toggleMicrophone() {
                const micButton = document.getElementById('mic-button');
                
                if (!this.micActive) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        
                        if (!this.audioContext) {
                            this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        }
                        
                        const source = this.audioContext.createMediaStreamSource(stream);
                        this.analyser = this.audioContext.createAnalyser();
                        this.analyser.fftSize = 256;
                        source.connect(this.analyser);
                        
                        this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
                        this.micActive = true;
                        micButton.classList.add('active');
                        
                        this.checkMicInput();
                    } catch (err) {
                        console.log('Microphone access denied');
                    }
                } else {
                    this.micActive = false;
                    micButton.classList.remove('active');
                }
            }
            
            checkMicInput() {
                if (!this.micActive || !this.analyser) return;
                
                this.analyser.getByteFrequencyData(this.dataArray);
                
                let sum = 0;
                for (let i = 0; i < this.dataArray.length; i++) {
                    sum += this.dataArray[i];
                }
                const average = sum / this.dataArray.length;
                
                // Only blow candles via microphone
                if (average > 50 && !this.candlesBlown) {
                    this.blowCandles();
                }
                
                requestAnimationFrame(() => this.checkMicInput());
            }
            
            blowCandles() {
                this.candlesBlown = true;
                
                // Dim the lights
                this.candleLights.forEach(light => {
                    gsap.to(light, {
                        duration: 1,
                        intensity: 0,
                        onComplete: () => { light.visible = false; }
                    });
                });
                
                // Extinguish flames
                this.flames.forEach(flame => {
                    gsap.to(flame.uniforms.uTime, {
                        duration: 1,
                        value: 0,
                        onComplete: () => { flame.visible = false; }
                    });
                });
                
                this.createSmoke();
                this.playSound('blow');
                
                // Scroll down to Memory Lane section
                setTimeout(() => {
                    const memoryLane = document.getElementById('memory-lane');
                    if (memoryLane) {
                        memoryLane.scrollIntoView({ behavior: 'smooth' });
                    }
                }, 1500);
            }
            
            createSmoke() {
                const smokeMaterial = new THREE.MeshBasicMaterial({
                    color: 0xCCCCCC,
                    transparent: true,
                    opacity: 0.5,
                    depthWrite: false
                });
                
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        const smoke = new THREE.Mesh(
                            new THREE.SphereGeometry(0.1, 8, 8),
                            smokeMaterial.clone()
                        );
                        smoke.position.set(0, 2.3, 0);
                        this.scene.add(smoke);
                        
                        gsap.to(smoke.position, {
                            duration: 3,
                            y: 5,
                            x: (Math.random() - 0.5) * 2,
                            z: (Math.random() - 0.5) * 2,
                            ease: 'power1.out'
                        });
                        
                        gsap.to(smoke.material, {
                            duration: 3,
                            opacity: 0,
                            onComplete: () => smoke.remove()
                        });
                    }, i * 50);
                }
            }
            
            startAR() {
                const arButton = document.getElementById('ar-button');
                const arDescription = document.querySelector('.ar-description');
                
                // Check for WebXR support
                if (navigator.xr) {
                    navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                        if (supported) {
                            arButton.textContent = '✨ Experience in AR';
                            arButton.disabled = false;
                            arButton.onclick = () => this.launchAR();
                            arDescription.textContent = 'Tap the button to place the magical birthday cake in your physical environment using AR!';
                        } else {
                            this.setARFallback();
                        }
                    }).catch(() => {
                        this.setARFallback();
                    });
                } else {
                    this.setARFallback();
                }
            }
            
            setARFallback() {
                const arButton = document.getElementById('ar-button');
                const arDescription = document.querySelector('.ar-description');
                
                // Update for 3D viewer fallback
                arDescription.textContent = 'Tap to view the magical 3D birthday cake! You can rotate and interact with it.';
                arButton.textContent = '🎂 View 3D Cake';
                arButton.disabled = false;
                arButton.onclick = () => this.launch3DViewer();
            }
            
            launchAR() {
                const arButton = document.getElementById('ar-button');
                arButton.textContent = 'Launching AR...';
                
                // Request AR session
                if (navigator.xr) {
                    navigator.xr.requestSession('immersive-ar', {
                        requiredFeatures: ['hit-test', 'local-floor'],
                        optionalFeatures: ['dom-overlay'],
                        domOverlay: { root: document.body }
                    }).then((session) => {
                        session.addEventListener('end', () => {
                            arButton.textContent = '✨ Experience in AR';
                        });
                        
                        this.renderer.xr.enabled = true;
                        this.renderer.xr.setReferenceSpaceType('local-floor');
                        this.renderer.xr.setSession(session);
                        
                        // Create AR cake
                        this.createARScene();
                        
                    }).catch((err) => {
                        console.log('AR session failed:', err);
                        this.launch3DViewer();
                    });
                }
            }
            
            createARScene() {
                // AR scene is handled by the main scene, just adjust for AR
                this.camera.position.set(0, 0, 3);
                this.camera.lookAt(0, 0, 0);
            }
            
            launch3DViewer() {
                // Create a modal 3D viewer
                const modal = document.createElement('div');
                modal.id = 'viewer-modal';
                modal.style.cssText = `
                    position: fixed;
                    inset: 0;
                    background: rgba(15, 23, 42, 0.95);
                    z-index: 10000;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    opacity: 0;
                    transition: opacity 0.5s ease;
                `;
                
                modal.innerHTML = `
                    <h2 style="font-family: 'Playfair Display', serif; color: #D4AF37; font-size: 2rem; margin-bottom: 20px;">🎂 Your Birthday Cake</h2>
                    <div id="viewer-canvas" style="width: 90vw; height: 60vh; max-width: 600px;"></div>
                    <p style="color: #F4E4C1; margin-top: 20px; text-align: center;">Drag to rotate • Scroll to zoom</p>
                    <button id="close-viewer" style="
                        margin-top: 30px;
                        padding: 15px 40px;
                        background: linear-gradient(135deg, #D4AF37, #F4E4C1);
                        border: none;
                        border-radius: 30px;
                        font-size: 1rem;
                        font-weight: 600;
                        color: #0F172A;
                        cursor: pointer;
                    ">Close</button>
                `;
                
                document.body.appendChild(modal);
                
                // Trigger animation
                setTimeout(() => modal.style.opacity = '1', 10);
                
                // Create 3D viewer scene
                this.create3DViewer(modal.querySelector('#viewer-canvas'));
                
                // Close button
                modal.querySelector('#close-viewer').addEventListener('click', () => {
                    modal.style.opacity = '0';
                    setTimeout(() => modal.remove(), 500);
                });
            }
            
            create3DViewer(container) {
                const viewerScene = new THREE.Scene();
                const viewerCamera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
                viewerCamera.position.set(0, 1, 5);
                
                const viewerRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                viewerRenderer.setSize(container.clientWidth, container.clientHeight);
                viewerRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(viewerRenderer.domElement);
                
                // Add lighting
                const ambient = new THREE.AmbientLight(0xFFF8E7, 0.5);
                viewerScene.add(ambient);
                
                const spotlight = new THREE.SpotLight(0xFFF8E7, 2);
                spotlight.position.set(0, 10, 5);
                viewerScene.add(spotlight);
                
                // Clone cake for viewer
                const cakeClone = this.cakeGroup.clone();
                viewerScene.add(cakeClone);
                
                // Make candles glow in viewer
                cakeClone.children.forEach(child => {
                    if (child.children) {
                        child.children.forEach(c => {
                            if (c.type === 'PointLight') {
                                c.intensity = 2;
                            }
                        });
                    }
                });
                
                // Mouse controls
                let isDragging = false;
                let previousMousePosition = { x: 0, y: 0 };
                
                container.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                });
                
                container.addEventListener('mouseup', () => isDragging = false);
                container.addEventListener('mouseleave', () => isDragging = false);
                
                container.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    
                    const deltaMove = {
                        x: e.clientX - previousMousePosition.x,
                        y: e.clientY - previousMousePosition.y
                    };
                    
                    cakeClone.rotation.y += deltaMove.x * 0.01;
                    cakeClone.rotation.x += deltaMove.y * 0.01;
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                });
                
                // Touch controls
                container.addEventListener('touchstart', (e) => {
                    isDragging = true;
                    previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                });
                
                container.addEventListener('touchend', () => isDragging = false);
                
                container.addEventListener('touchmove', (e) => {
                    if (!isDragging) return;
                    
                    const deltaMove = {
                        x: e.touches[0].clientX - previousMousePosition.x,
                        y: e.touches[0].clientY - previousMousePosition.y
                    };
                    
                    cakeClone.rotation.y += deltaMove.x * 0.01;
                    cakeClone.rotation.x += deltaMove.y * 0.01;
                    
                    previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                });
                
                // Zoom
                container.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    viewerCamera.position.z += e.deltaY * 0.01;
                    viewerCamera.position.z = Math.max(2, Math.min(10, viewerCamera.position.z));
                });
                
                // Animate
                const animateViewer = () => {
                    requestAnimationFrame(animateViewer);
                    cakeClone.rotation.y += 0.005;
                    viewerRenderer.render(viewerScene, viewerCamera);
                };
                animateViewer();
                
                // Handle resize
                window.addEventListener('resize', () => {
                    viewerCamera.aspect = container.clientWidth / container.clientHeight;
                    viewerCamera.updateProjectionMatrix();
                    viewerRenderer.setSize(container.clientWidth, container.clientHeight);
                });
            }
            
            animate() {
                requestAnimationFrame(() => this.animate());
                
                const delta = this.clock.getDelta();
                const elapsed = this.clock.getElapsedTime();
                
                this.mouse.x += (this.targetMouse.x - this.mouse.x) * 0.05;
                this.mouse.y += (this.targetMouse.y - this.mouse.y) * 0.05;
                
                this.camera.position.x = this.mouse.x * 0.5;
                this.camera.position.y = 2 - window.scrollY * 0.02 + this.mouse.y * 0.3;
                this.camera.lookAt(0, 1.5, 0);
                
                this.flames.forEach(flame => {
                    flame.uniforms.uTime.value = elapsed;
                });
                
                this.candleLights.forEach((light, i) => {
                    light.intensity = 1.5 + Math.sin(elapsed * 10 + i) * 0.3;
                });
                
                const positions = this.dustParticles.geometry.attributes.position.array;
                for (let i = 0; i < positions.length; i += 3) {
                    positions[i] += Math.sin(elapsed + i) * 0.002;
                    positions[i + 1] -= 0.001;
                    if (positions[i + 1] < 0) {
                        positions[i + 1] = 10;
                    }
                }
                this.dustParticles.geometry.attributes.position.needsUpdate = true;
                
                this.rosePetals.forEach(petal => {
                    petal.position.add(petal.userData.velocity);
                    petal.rotation.x += petal.userData.rotationSpeed.x;
                    petal.rotation.y += petal.userData.rotationSpeed.y;
                    petal.rotation.z += petal.userData.rotationSpeed.z;
                    
                    if (petal.position.y < 0) {
                        petal.position.y = 8;
                        petal.position.x = (Math.random() - 0.5) * 15;
                        petal.position.z = (Math.random() - 0.5) * 10;
                    }
                });
                
                if (this.cakeGroup) {
                    this.cakeGroup.position.y = Math.sin(elapsed * 0.5) * 0.1;
                    this.cakeGroup.rotation.y = Math.sin(elapsed * 0.2) * 0.05;
                }
                
                this.renderer.render(this.scene, this.camera);
            }
        }
        
        // Start background immediately
        new PrismBackground(document.getElementById('prism-bg'));
        
        window.addEventListener('DOMContentLoaded', () => {
            new BirthdayApp();
        });
    </script>
